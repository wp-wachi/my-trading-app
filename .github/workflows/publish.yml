name: Build and Publish to GHCR

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. ตั้งค่า Buildx ก่อน (สำคัญมากสำหรับการทำ Cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Login เข้าสู่ GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. เตรียม Metadata (Tags) - ปรับปรุงให้ชัดเจนขึ้น
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 4. Build และ Push - ตรวจสอบว่าเรียกใช้ tags ถูกต้อง
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ตรวจสอบว่ามีบรรทัดนี้ และเรียกใช้ไอดี meta ถูกต้อง
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max